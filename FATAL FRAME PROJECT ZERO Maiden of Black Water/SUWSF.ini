[UserSettings]
; Set to your screen resolution (e.g. "3440x1440") (default: "auto")
Resolution="auto"
; Globally enable or disable patches (default: true)
Enabled=true

; WARNING: PATCHES BELOW. DO NOT MODIFY UNLESS YOU KNOW WHAT YOU ARE DOING.
; Normally users should not need to edit this

[Patch:ReplaceResolution1920]
; Whether this patch should be enabled (default: true)
Enabled=true
Pattern="80 07 00 00 38 04 00 00"
Offset=0
Value="width"
ValueType="int"
Match="1"
Module="auto"

[Patch:ReplaceResolution1080]
; Whether this patch should be enabled (default: true)
Enabled=true
Pattern="38 04 00 00 00 0A 00 00"
Offset=0
Value="height"
ValueType="int"
Match="1"
Module="auto"

[Patch:AspectRatio]
; Whether this patch should be enabled (default: true)
Enabled=true
Pattern="39 8E E3 3F"
Offset=0
Value="aspectratio"
ValueType="float"
Match="1"
Module="auto"
