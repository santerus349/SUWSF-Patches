[UserSettings]
; Set to your screen resolution (e.g. "3840x2160") (default: "auto")
Resolution="auto"
; Globally enable or disable patches (default: true)
Enabled=true

; WARNING: PATCHES BELOW. DO NOT MODIFY UNLESS YOU KNOW WHAT YOU ARE DOING.
; Normally users should not need to edit this


[Patch:CustomResolutionX]
Enabled=true
Pattern="40 06 00 00 80 07 00 00"
Offset=4
Value="width"
ValueType="int"
Match="1"
Module="auto"

[Patch:CustomResolutionY]
Enabled=true
Pattern="84 03 00 00 38 04 00 00"
Offset=4
Value="height"
ValueType="int"
Match="1"
Module="auto"
